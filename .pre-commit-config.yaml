repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
    # linter
    - id: ruff-check
      args: [ "--fix" ]
    # formatter
    - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright (venv)
        entry: pyright --project=.
        language: system
        pass_filenames: false
